global:
  scrape_interval: 10s
  external_labels:
    monitor: 'node'
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
  - job_name: 'nvidia_smi_exporter'
    static_configs:
      - targets: ['localhost:9835']
